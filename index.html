<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bendra virtuali lenta</title>
  <style>
    :root {
      --bg: #eef2ff;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --danger: #dc2626;
      --ok: #16a34a;
      --warn: #d97706;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 36%),
        linear-gradient(135deg, #f8fafc, var(--bg));
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
      padding: 16px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(209, 213, 219, 0.85);
      border-radius: 22px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2rem);
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.35;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--warn);
      box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.12);
    }

    .dot.online {
      background: var(--ok);
      box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.12);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .group {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px;
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    button, select, input[type="range"] { font: inherit; }

    button, select {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 9px 11px;
      cursor: pointer;
      transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease;
    }

    button:hover, select:hover {
      border-color: #93c5fd;
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 700;
    }

    button.primary:hover { background: var(--accent-dark); }

    button.danger { color: var(--danger); }

    input[type="color"] {
      width: 42px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 3px;
      background: #fff;
      cursor: pointer;
    }

    label {
      color: var(--muted);
      font-size: 0.88rem;
      white-space: nowrap;
    }

    .board-shell {
      min-height: 0;
      display: grid;
      place-items: stretch;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(209, 213, 219, 0.85);
      border-radius: 24px;
      padding: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .canvas-wrap {
      position: relative;
      width: 100%;
      min-height: 460px;
      border-radius: 18px;
      overflow: hidden;
      background: white;
      border: 1px solid var(--border);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: crosshair;
    }

    .note-input {
      position: absolute;
      display: none;
      min-width: 160px;
      max-width: 280px;
      padding: 9px 10px;
      border: 2px solid var(--accent);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font: 20px system-ui, sans-serif;
      outline: none;
      box-shadow: 0 12px 35px rgba(15, 23, 42, 0.18);
      z-index: 10;
    }

    .help {
      position: absolute;
      right: 14px;
      bottom: 14px;
      max-width: 460px;
      padding: 10px 12px;
      border-radius: 14px;
      color: #475569;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(209, 213, 219, 0.9);
      font-size: 0.9rem;
      pointer-events: none;
    }

    .error-box {
      display: none;
      margin-top: 8px;
      padding: 9px 11px;
      border-radius: 12px;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
      font-size: 0.88rem;
      max-width: 680px;
    }

    @media (max-width: 760px) {
      .app { padding: 10px; }
      header { border-radius: 16px; }
      .toolbar { justify-content: flex-start; }
      .group {
        width: 100%;
        justify-content: space-between;
      }
      .canvas-wrap { min-height: 540px; }
      .help {
        left: 14px;
        right: 14px;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Bendra virtuali lenta</h1>
        <div class="subtitle">
          Visi, kurie atsidaro šią nuorodą, mato tą pačią lentą. Dabar piešimas matomas gyvai.
        </div>
        <div class="status">
          <span class="dot" id="statusDot"></span>
          <span id="statusText">Jungiamasi prie Firebase...</span>
        </div>
        <div class="error-box" id="errorBox"></div>
      </div>

      <div class="toolbar" aria-label="Lentos įrankiai">
        <div class="group">
          <button id="penBtn" class="active" type="button">✏️ Pieštukas</button>
          <button id="eraserBtn" type="button">🧽 Trintukas</button>
          <button id="textBtn" type="button">🔤 Tekstas</button>
        </div>

        <div class="group">
          <label for="color">Spalva</label>
          <input id="color" type="color" value="#111827" />
          <label for="size">Dydis</label>
          <input id="size" type="range" min="2" max="48" value="7" />
          <span id="sizeValue">7</span>
        </div>

        <div class="group">
          <label for="background">Fonas</label>
          <select id="background">
            <option value="blank">Baltas</option>
            <option value="grid">Tinklelis</option>
            <option value="lines">Linijos</option>
            <option value="dots">Taškai</option>
          </select>
        </div>

        <div class="group">
          <button id="undoBtn" type="button">↶ Atšaukti mano paskutinį</button>
          <button id="clearBtn" class="danger" type="button">🗑️ Išvalyti visiems</button>
          <button id="saveBtn" class="primary" type="button">💾 Išsaugoti PNG</button>
        </div>
      </div>
    </header>

    <section class="board-shell">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="board" aria-label="Bendra virtuali piešimo lenta"></canvas>
        <input id="noteInput" class="note-input" type="text" placeholder="Įrašyk tekstą..." />
        <div class="help">
          Piešiant brūkšnys siunčiamas į Firebase kas keliasdešimt milisekundžių, todėl kiti mato piešimą beveik gyvai.
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getDatabase,
      ref,
      push,
      set,
      remove,
      onValue,
      serverTimestamp,
      onDisconnect
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA5zJ2jx67MMg9b_aYn7QW1_ORmQAaMrCg",
      authDomain: "virtuali-lenta.firebaseapp.com",
      databaseURL: "https://virtuali-lenta-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "virtuali-lenta",
      storageBucket: "virtuali-lenta.firebasestorage.app",
      messagingSenderId: "101736426636",
      appId: "1:101736426636:web:4c6c8da5417e4a8d06dfa9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const boardId = "bendra-lenta";
    const elementsRef = ref(db, `boards/${boardId}/elements`);
    const liveStrokesRef = ref(db, `boards/${boardId}/liveStrokes`);
    const myLiveStrokeRef = ref(db, `boards/${boardId}/liveStrokes/${getClientId()}`);
    const backgroundRef = ref(db, `boards/${boardId}/meta/background`);
    const presenceRef = ref(db, `boards/${boardId}/presence/${getClientId()}`);
    const connectedRef = ref(db, ".info/connected");

    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const penBtn = document.getElementById("penBtn");
    const eraserBtn = document.getElementById("eraserBtn");
    const textBtn = document.getElementById("textBtn");
    const colorInput = document.getElementById("color");
    const sizeInput = document.getElementById("size");
    const sizeValue = document.getElementById("sizeValue");
    const backgroundSelect = document.getElementById("background");
    const undoBtn = document.getElementById("undoBtn");
    const clearBtn = document.getElementById("clearBtn");
    const saveBtn = document.getElementById("saveBtn");
    const noteInput = document.getElementById("noteInput");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const errorBox = document.getElementById("errorBox");

    const clientId = getClientId();
    const ownKeys = JSON.parse(localStorage.getItem("manoLentosObjektai") || "[]");

    let tool = "pen";
    let isDrawing = false;
    let last = null;
    let currentStroke = null;
    let allElements = [];
    let liveStrokes = [];
    let currentBackground = "blank";
    let textPosition = null;
    let suppressBgEvent = false;
    let lastLiveSend = 0;
    let pendingLiveTimer = null;

    const board = {
      width: 1600,
      height: 1000
    };

    function getClientId() {
      let id = localStorage.getItem("lentosClientId");
      if (!id) {
        id = crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2);
        localStorage.setItem("lentosClientId", id);
      }
      return id;
    }

    function showError(message) {
      errorBox.style.display = "block";
      errorBox.textContent = message;
    }

    function setStatus(isOnline, text) {
      statusDot.classList.toggle("online", isOnline);
      statusText.textContent = text;
    }

    function initPresence() {
      onValue(connectedRef, (snapshot) => {
        if (snapshot.val() === true) {
          set(presenceRef, {
            online: true,
            updatedAt: Date.now()
          });
          onDisconnect(presenceRef).remove();
          onDisconnect(myLiveStrokeRef).remove();
          setStatus(true, "Prisijungta. Lenta sinchronizuojama gyvai.");
        } else {
          setStatus(false, "Nėra ryšio su Firebase.");
        }
      }, (error) => {
        setStatus(false, "Nepavyko prisijungti.");
        showError("Firebase klaida: " + error.message);
      });
    }

    function resizeCanvas() {
      canvas.width = board.width;
      canvas.height = board.height;
      redraw();
    }

    function drawBackground(type = currentBackground) {
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (type === "grid") {
        ctx.strokeStyle = "#e5e7eb";
        ctx.lineWidth = 1;
        for (let x = 0; x <= canvas.width; x += 40) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, canvas.height);
          ctx.stroke();
        }
        for (let y = 0; y <= canvas.height; y += 40) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(canvas.width, y);
          ctx.stroke();
        }
      }

      if (type === "lines") {
        ctx.strokeStyle = "#dbeafe";
        ctx.lineWidth = 2;
        for (let y = 70; y <= canvas.height; y += 55) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(canvas.width, y);
          ctx.stroke();
        }
      }

      if (type === "dots") {
        ctx.fillStyle = "#d1d5db";
        for (let x = 24; x <= canvas.width; x += 40) {
          for (let y = 24; y <= canvas.height; y += 40) {
            ctx.beginPath();
            ctx.arc(x, y, 2.2, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      ctx.restore();
    }

    function redraw() {
      drawBackground(currentBackground);
      allElements.forEach(drawElement);
      liveStrokes.forEach(drawElement);

      // Jei piešiame šiuo metu, parodome ir savo dar neužbaigtą brūkšnį.
      if (currentStroke && !liveStrokes.some(stroke => stroke.clientId === clientId)) {
        drawElement(currentStroke);
      }

      updateUndoButton();
    }

    function drawElement(element) {
      if (!element) return;

      if (element.type === "stroke") {
        drawStroke(element);
      }

      if (element.type === "text") {
        drawText(element);
      }
    }

    function drawStroke(stroke) {
      if (!stroke.points || stroke.points.length < 1) return;

      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.lineWidth = Number(stroke.size || 7);

      if (stroke.tool === "eraser") {
        ctx.globalCompositeOperation = "destination-out";
        ctx.strokeStyle = "rgba(0,0,0,1)";
      } else {
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = stroke.color || "#111827";
      }

      ctx.beginPath();
      ctx.moveTo(stroke.points[0].x, stroke.points[0].y);

      for (let i = 1; i < stroke.points.length; i++) {
        ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
      }

      if (stroke.points.length === 1) {
        const p = stroke.points[0];
        ctx.lineTo(p.x + 0.01, p.y + 0.01);
      }

      ctx.stroke();
      ctx.restore();
    }

    function drawSegment(a, b, strokeTool, color, size) {
      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.lineWidth = Number(size || 7);

      if (strokeTool === "eraser") {
        ctx.globalCompositeOperation = "destination-out";
        ctx.strokeStyle = "rgba(0,0,0,1)";
      } else {
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = color || "#111827";
      }

      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
      ctx.restore();
    }

    function drawText(element) {
      const fontSize = Math.max(18, Number(element.size || 7) * 4);
      const text = String(element.text || "");

      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = element.color || "#111827";
      ctx.font = `700 ${fontSize}px system-ui, sans-serif`;
      ctx.textBaseline = "top";

      const lines = wrapText(text, 32);
      lines.forEach((line, index) => {
        ctx.fillText(line, element.x, element.y + index * fontSize * 1.25);
      });

      ctx.restore();
    }

    function wrapText(text, maxChars) {
      const words = text.split(/\s+/);
      const lines = [];
      let line = "";

      words.forEach((word) => {
        const test = line ? `${line} ${word}` : word;
        if (test.length > maxChars && line) {
          lines.push(line);
          line = word;
        } else {
          line = test;
        }
      });

      if (line) lines.push(line);
      return lines.length ? lines : [text];
    }

    function getPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) * (canvas.width / rect.width),
        y: (event.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function setTool(nextTool) {
      tool = nextTool;
      penBtn.classList.toggle("active", tool === "pen");
      eraserBtn.classList.toggle("active", tool === "eraser");
      textBtn.classList.toggle("active", tool === "text");
      canvas.style.cursor = tool === "text" ? "text" : "crosshair";
    }

    async function startDrawing(event) {
      if (tool === "text") {
        openTextInput(event);
        return;
      }

      isDrawing = true;
      const point = getPoint(event);
      last = point;
      currentStroke = {
        type: "stroke",
        tool,
        color: colorInput.value,
        size: Number(sizeInput.value),
        points: [point],
        clientId,
        live: true,
        updatedAt: Date.now()
      };

      canvas.setPointerCapture(event.pointerId);
      await sendLiveStroke(true);
    }

    function draw(event) {
      if (!isDrawing || !last || !currentStroke) return;

      const current = getPoint(event);
      const dx = current.x - last.x;
      const dy = current.y - last.y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < 2) return;

      currentStroke.points.push(current);
      currentStroke.updatedAt = Date.now();

      // Vietiniame ekrane piešiame iš karto, kad nebūtų vėlavimo.
      drawSegment(last, current, currentStroke.tool, currentStroke.color, currentStroke.size);
      last = current;

      scheduleLiveStrokeSend();
    }

    async function stopDrawing(event) {
      if (!isDrawing || !currentStroke) return;

      isDrawing = false;
      last = null;

      try {
        canvas.releasePointerCapture(event.pointerId);
      } catch (_) {}

      if (pendingLiveTimer) {
        clearTimeout(pendingLiveTimer);
        pendingLiveTimer = null;
      }

      const element = {
        ...currentStroke,
        live: false,
        createdAt: Date.now(),
        serverCreatedAt: serverTimestamp()
      };

      currentStroke = null;

      try {
        const newRef = push(elementsRef);
        await set(newRef, element);
        rememberOwnKey(newRef.key);
        await remove(myLiveStrokeRef);
      } catch (error) {
        showError("Nepavyko išsaugoti brūkšnio. Patikrink Firebase Rules. Klaida: " + error.message);
        try {
          await remove(myLiveStrokeRef);
        } catch (_) {}
      }
    }

    function scheduleLiveStrokeSend() {
      const now = Date.now();
      const intervalMs = 55;

      if (now - lastLiveSend >= intervalMs) {
        sendLiveStroke();
        return;
      }

      if (!pendingLiveTimer) {
        pendingLiveTimer = setTimeout(() => {
          pendingLiveTimer = null;
          sendLiveStroke();
        }, intervalMs - (now - lastLiveSend));
      }
    }

    async function sendLiveStroke(force = false) {
      if (!currentStroke) return;

      const now = Date.now();
      if (!force && now - lastLiveSend < 35) return;

      lastLiveSend = now;

      try {
        await set(myLiveStrokeRef, {
          ...currentStroke,
          updatedAt: Date.now()
        });
      } catch (error) {
        showError("Nepavyko siųsti gyvo piešimo. Klaida: " + error.message);
      }
    }

    function openTextInput(event) {
      const point = getPoint(event);
      const rect = canvas.getBoundingClientRect();
      textPosition = point;

      noteInput.value = "";
      noteInput.style.display = "block";
      noteInput.style.left = `${event.clientX - rect.left}px`;
      noteInput.style.top = `${event.clientY - rect.top}px`;
      noteInput.style.color = colorInput.value;
      noteInput.style.fontSize = `${Math.max(14, Number(sizeInput.value) * 3)}px`;
      noteInput.focus();
    }

    async function commitText() {
      const text = noteInput.value.trim();

      if (!text || !textPosition) {
        noteInput.style.display = "none";
        textPosition = null;
        return;
      }

      const element = {
        type: "text",
        text,
        x: textPosition.x,
        y: textPosition.y,
        color: colorInput.value,
        size: Number(sizeInput.value),
        clientId,
        createdAt: Date.now(),
        serverCreatedAt: serverTimestamp()
      };

      noteInput.style.display = "none";
      textPosition = null;

      try {
        const newRef = push(elementsRef);
        await set(newRef, element);
        rememberOwnKey(newRef.key);
      } catch (error) {
        showError("Nepavyko išsaugoti teksto. Patikrink Realtime Database taisykles. Klaida: " + error.message);
      }
    }

    function rememberOwnKey(key) {
      if (!key) return;
      ownKeys.push(key);
      while (ownKeys.length > 30) ownKeys.shift();
      localStorage.setItem("manoLentosObjektai", JSON.stringify(ownKeys));
      updateUndoButton();
    }

    function updateUndoButton() {
      undoBtn.disabled = ownKeys.length === 0;
    }

    async function undoOwnLast() {
      const key = ownKeys.pop();
      localStorage.setItem("manoLentosObjektai", JSON.stringify(ownKeys));
      updateUndoButton();
      if (!key) return;

      try {
        await remove(ref(db, `boards/${boardId}/elements/${key}`));
      } catch (error) {
        showError("Nepavyko atšaukti paskutinio veiksmo: " + error.message);
      }
    }

    async function clearBoard() {
      const ok = confirm("Ar tikrai išvalyti lentą visiems žmonėms?");
      if (!ok) return;

      try {
        await remove(elementsRef);
        await remove(liveStrokesRef);
        ownKeys.length = 0;
        localStorage.setItem("manoLentosObjektai", JSON.stringify(ownKeys));
        updateUndoButton();
      } catch (error) {
        showError("Nepavyko išvalyti lentos. Klaida: " + error.message);
      }
    }

    async function changeBackground() {
      if (suppressBgEvent) return;

      try {
        await set(backgroundRef, backgroundSelect.value);
      } catch (error) {
        showError("Nepavyko pakeisti fono: " + error.message);
      }
    }

    function savePng() {
      redraw();
      const link = document.createElement("a");
      const date = new Date().toISOString().slice(0, 10);
      link.download = `bendra-virtuali-lenta-${date}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    function subscribeToFirebase() {
      onValue(elementsRef, (snapshot) => {
        const data = snapshot.val() || {};
        allElements = Object.entries(data)
          .sort(([a], [b]) => a.localeCompare(b))
          .map(([key, value]) => ({ key, ...value }));
        redraw();
      }, (error) => {
        showError("Nepavyko nuskaityti lentos. Patikrink Firebase Rules. Klaida: " + error.message);
      });

      onValue(liveStrokesRef, (snapshot) => {
        const data = snapshot.val() || {};
        const now = Date.now();

        liveStrokes = Object.values(data)
          .filter(stroke => stroke && stroke.points && stroke.points.length > 0)
          .filter(stroke => !stroke.updatedAt || now - stroke.updatedAt < 30000);

        redraw();
      }, (error) => {
        showError("Nepavyko nuskaityti gyvų brūkšnių. Klaida: " + error.message);
      });

      onValue(backgroundRef, (snapshot) => {
        currentBackground = snapshot.val() || "blank";
        suppressBgEvent = true;
        backgroundSelect.value = currentBackground;
        suppressBgEvent = false;
        redraw();
      }, (error) => {
        showError("Nepavyko nuskaityti fono: " + error.message);
      });
    }

    penBtn.addEventListener("click", () => setTool("pen"));
    eraserBtn.addEventListener("click", () => setTool("eraser"));
    textBtn.addEventListener("click", () => setTool("text"));

    sizeInput.addEventListener("input", () => {
      sizeValue.textContent = sizeInput.value;
    });

    backgroundSelect.addEventListener("change", changeBackground);
    undoBtn.addEventListener("click", undoOwnLast);
    clearBtn.addEventListener("click", clearBoard);
    saveBtn.addEventListener("click", savePng);

    canvas.addEventListener("pointerdown", startDrawing);
    canvas.addEventListener("pointermove", draw);
    canvas.addEventListener("pointerup", stopDrawing);
    canvas.addEventListener("pointercancel", stopDrawing);
    canvas.addEventListener("pointerleave", stopDrawing);

    noteInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") commitText();
      if (event.key === "Escape") {
        noteInput.style.display = "none";
        textPosition = null;
      }
    });

    noteInput.addEventListener("blur", commitText);

    window.addEventListener("resize", redraw);
    window.addEventListener("beforeunload", () => {
      remove(myLiveStrokeRef);
    });

    resizeCanvas();
    initPresence();
    subscribeToFirebase();
    updateUndoButton();
  </script>
</body>
</html>
