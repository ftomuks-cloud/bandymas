<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtuali lenta</title>
  <style>
    :root {
      --bg: #eef2ff;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --danger: #dc2626;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 36%),
        linear-gradient(135deg, #f8fafc, var(--bg));
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
      padding: 16px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(209, 213, 219, 0.85);
      border-radius: 22px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2rem);
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .group {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px;
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    button, select, input[type="range"] {
      font: inherit;
    }

    button, select {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 9px 11px;
      cursor: pointer;
      transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease;
    }

    button:hover, select:hover {
      border-color: #93c5fd;
      transform: translateY(-1px);
    }

    button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 700;
    }

    button.primary:hover {
      background: var(--accent-dark);
    }

    button.danger {
      color: var(--danger);
    }

    input[type="color"] {
      width: 42px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 3px;
      background: #fff;
      cursor: pointer;
    }

    label {
      color: var(--muted);
      font-size: 0.88rem;
      white-space: nowrap;
    }

    .board-shell {
      min-height: 0;
      display: grid;
      place-items: stretch;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(209, 213, 219, 0.85);
      border-radius: 24px;
      padding: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .canvas-wrap {
      position: relative;
      width: 100%;
      min-height: 460px;
      border-radius: 18px;
      overflow: hidden;
      background: white;
      border: 1px solid var(--border);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: crosshair;
    }

    .note-input {
      position: absolute;
      display: none;
      min-width: 160px;
      max-width: 260px;
      padding: 9px 10px;
      border: 2px solid var(--accent);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font: 20px system-ui, sans-serif;
      outline: none;
      box-shadow: 0 12px 35px rgba(15, 23, 42, 0.18);
      z-index: 10;
    }

    .help {
      position: absolute;
      right: 14px;
      bottom: 14px;
      max-width: 360px;
      padding: 10px 12px;
      border-radius: 14px;
      color: #475569;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(209, 213, 219, 0.9);
      font-size: 0.9rem;
      pointer-events: none;
    }

    @media (max-width: 720px) {
      .app {
        padding: 10px;
      }

      header {
        border-radius: 16px;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .group {
        width: 100%;
        justify-content: space-between;
      }

      .canvas-wrap {
        min-height: 520px;
      }

      .help {
        left: 14px;
        right: 14px;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Virtuali lenta</h1>
        <div class="subtitle">Piešk, trink, rašyk tekstą ir išsaugok lentą kaip paveikslėlį.</div>
      </div>

      <div class="toolbar" aria-label="Lentos įrankiai">
        <div class="group">
          <button id="penBtn" class="active" type="button">✏️ Pieštukas</button>
          <button id="eraserBtn" type="button">🧽 Trintukas</button>
          <button id="textBtn" type="button">🔤 Tekstas</button>
        </div>

        <div class="group">
          <label for="color">Spalva</label>
          <input id="color" type="color" value="#111827" />
          <label for="size">Dydis</label>
          <input id="size" type="range" min="2" max="48" value="7" />
          <span id="sizeValue">7</span>
        </div>

        <div class="group">
          <label for="background">Fonas</label>
          <select id="background">
            <option value="blank">Baltas</option>
            <option value="grid">Tinklelis</option>
            <option value="lines">Linijos</option>
            <option value="dots">Taškai</option>
          </select>
        </div>

        <div class="group">
          <button id="undoBtn" type="button">↶ Atgal</button>
          <button id="redoBtn" type="button">↷ Pirmyn</button>
          <button id="clearBtn" class="danger" type="button">🗑️ Valyti</button>
          <button id="saveBtn" class="primary" type="button">💾 Išsaugoti PNG</button>
        </div>
      </div>
    </header>

    <section class="board-shell">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="board" aria-label="Virtuali piešimo lenta"></canvas>
        <input id="noteInput" class="note-input" type="text" placeholder="Įrašyk tekstą..." />
        <div class="help">
          Patarimas: su pele arba pirštu piešk lentoje. Pasirink „Tekstas“ ir spustelėk lentoje, kad pridėtum užrašą.
        </div>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("board");
    const wrap = document.getElementById("canvasWrap");
    const ctx = canvas.getContext("2d");

    const penBtn = document.getElementById("penBtn");
    const eraserBtn = document.getElementById("eraserBtn");
    const textBtn = document.getElementById("textBtn");
    const colorInput = document.getElementById("color");
    const sizeInput = document.getElementById("size");
    const sizeValue = document.getElementById("sizeValue");
    const backgroundSelect = document.getElementById("background");
    const undoBtn = document.getElementById("undoBtn");
    const redoBtn = document.getElementById("redoBtn");
    const clearBtn = document.getElementById("clearBtn");
    const saveBtn = document.getElementById("saveBtn");
    const noteInput = document.getElementById("noteInput");

    let tool = "pen";
    let isDrawing = false;
    let last = null;
    let history = [];
    let redoStack = [];
    let textPosition = null;

    const board = {
      width: 1600,
      height: 1000
    };

    function resizeCanvas() {
      const oldImage = document.createElement("canvas");
      oldImage.width = canvas.width || board.width;
      oldImage.height = canvas.height || board.height;
      oldImage.getContext("2d").drawImage(canvas, 0, 0);

      canvas.width = board.width;
      canvas.height = board.height;

      ctx.drawImage(oldImage, 0, 0, canvas.width, canvas.height);
      redrawFromHistory();
    }

    function drawBackground() {
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const bg = backgroundSelect.value;

      if (bg === "grid") {
        ctx.strokeStyle = "#e5e7eb";
        ctx.lineWidth = 1;
        for (let x = 0; x <= canvas.width; x += 40) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, canvas.height);
          ctx.stroke();
        }
        for (let y = 0; y <= canvas.height; y += 40) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(canvas.width, y);
          ctx.stroke();
        }
      }

      if (bg === "lines") {
        ctx.strokeStyle = "#dbeafe";
        ctx.lineWidth = 2;
        for (let y = 70; y <= canvas.height; y += 55) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(canvas.width, y);
          ctx.stroke();
        }
      }

      if (bg === "dots") {
        ctx.fillStyle = "#d1d5db";
        for (let x = 24; x <= canvas.width; x += 40) {
          for (let y = 24; y <= canvas.height; y += 40) {
            ctx.beginPath();
            ctx.arc(x, y, 2.2, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      ctx.restore();
    }

    function getPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) * (canvas.width / rect.width),
        y: (event.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function snapshot() {
      history.push(canvas.toDataURL("image/png"));
      if (history.length > 40) history.shift();
      redoStack = [];
      updateButtons();
    }

    function restore(dataUrl, callback) {
      const img = new Image();
      img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        if (callback) callback();
      };
      img.src = dataUrl;
    }

    function redrawFromHistory() {
      if (history.length > 0) {
        restore(history[history.length - 1]);
      } else {
        drawBackground();
        snapshot();
      }
    }

    function updateButtons() {
      undoBtn.disabled = history.length <= 1;
      redoBtn.disabled = redoStack.length === 0;
    }

    function setTool(nextTool) {
      tool = nextTool;
      penBtn.classList.toggle("active", tool === "pen");
      eraserBtn.classList.toggle("active", tool === "eraser");
      textBtn.classList.toggle("active", tool === "text");
      canvas.style.cursor = tool === "text" ? "text" : "crosshair";
    }

    function startDrawing(event) {
      if (tool === "text") {
        openTextInput(event);
        return;
      }

      isDrawing = true;
      last = getPoint(event);
      canvas.setPointerCapture(event.pointerId);
    }

    function draw(event) {
      if (!isDrawing || !last) return;

      const current = getPoint(event);

      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.lineWidth = Number(sizeInput.value);

      if (tool === "eraser") {
        ctx.globalCompositeOperation = "destination-out";
        ctx.strokeStyle = "rgba(0,0,0,1)";
      } else {
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = colorInput.value;
      }

      ctx.beginPath();
      ctx.moveTo(last.x, last.y);
      ctx.lineTo(current.x, current.y);
      ctx.stroke();
      ctx.restore();

      last = current;
    }

    function stopDrawing(event) {
      if (!isDrawing) return;
      isDrawing = false;
      last = null;
      try {
        canvas.releasePointerCapture(event.pointerId);
      } catch (_) {}
      snapshot();
    }

    function openTextInput(event) {
      const point = getPoint(event);
      const rect = canvas.getBoundingClientRect();
      textPosition = point;

      noteInput.value = "";
      noteInput.style.display = "block";
      noteInput.style.left = `${event.clientX - rect.left}px`;
      noteInput.style.top = `${event.clientY - rect.top}px`;
      noteInput.style.color = colorInput.value;
      noteInput.style.fontSize = `${Math.max(14, Number(sizeInput.value) * 3)}px`;
      noteInput.focus();
    }

    function commitText() {
      const text = noteInput.value.trim();
      if (!text || !textPosition) {
        noteInput.style.display = "none";
        return;
      }

      const fontSize = Math.max(18, Number(sizeInput.value) * 4);
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = colorInput.value;
      ctx.font = `700 ${fontSize}px system-ui, sans-serif`;
      ctx.textBaseline = "top";

      const lines = text.match(/.{1,32}/g) || [text];
      lines.forEach((line, index) => {
        ctx.fillText(line, textPosition.x, textPosition.y + index * fontSize * 1.25);
      });

      ctx.restore();
      noteInput.style.display = "none";
      textPosition = null;
      snapshot();
    }

    function undo() {
      if (history.length <= 1) return;
      redoStack.push(history.pop());
      restore(history[history.length - 1], updateButtons);
    }

    function redo() {
      if (redoStack.length === 0) return;
      const data = redoStack.pop();
      history.push(data);
      restore(data, updateButtons);
    }

    function clearBoard() {
      const ok = confirm("Ar tikrai išvalyti lentą?");
      if (!ok) return;
      drawBackground();
      snapshot();
    }

    function changeBackground() {
      const image = new Image();
      image.onload = () => {
        drawBackground();
        ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
        snapshot();
      };
      image.src = canvas.toDataURL("image/png");
    }

    function savePng() {
      const link = document.createElement("a");
      const date = new Date().toISOString().slice(0, 10);
      link.download = `virtuali-lenta-${date}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    penBtn.addEventListener("click", () => setTool("pen"));
    eraserBtn.addEventListener("click", () => setTool("eraser"));
    textBtn.addEventListener("click", () => setTool("text"));

    sizeInput.addEventListener("input", () => {
      sizeValue.textContent = sizeInput.value;
    });

    backgroundSelect.addEventListener("change", changeBackground);

    undoBtn.addEventListener("click", undo);
    redoBtn.addEventListener("click", redo);
    clearBtn.addEventListener("click", clearBoard);
    saveBtn.addEventListener("click", savePng);

    canvas.addEventListener("pointerdown", startDrawing);
    canvas.addEventListener("pointermove", draw);
    canvas.addEventListener("pointerup", stopDrawing);
    canvas.addEventListener("pointercancel", stopDrawing);
    canvas.addEventListener("pointerleave", stopDrawing);

    noteInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") commitText();
      if (event.key === "Escape") {
        noteInput.style.display = "none";
        textPosition = null;
      }
    });

    noteInput.addEventListener("blur", commitText);

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      if ((event.ctrlKey || event.metaKey) && key === "z") {
        event.preventDefault();
        undo();
      }

      if ((event.ctrlKey || event.metaKey) && (key === "y" || (event.shiftKey && key === "z"))) {
        event.preventDefault();
        redo();
      }
    });

    resizeCanvas();
    drawBackground();
    history = [];
    snapshot();
  </script>
</body>
</html>
