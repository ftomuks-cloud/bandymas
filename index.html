<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gyvatėlės žaidimas</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --danger: #ef4444;
      --grid: #1f2937;
      --snake: #22c55e;
      --snake-head: #86efac;
      --food: #f97316;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(34, 197, 94, 0.18), transparent 38%),
        linear-gradient(135deg, #020617, var(--bg));
    }

    .game-card {
      width: min(94vw, 620px);
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      padding: 22px;
      backdrop-filter: blur(12px);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 4vw, 2.3rem);
      letter-spacing: -0.04em;
    }

    .hint {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .score-panel {
      min-width: 135px;
      text-align: right;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .score-panel strong {
      display: block;
      color: var(--accent);
      font-size: 2rem;
      line-height: 1;
      margin-top: 4px;
    }

    .canvas-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      background: #020617;
      border: 1px solid rgba(148, 163, 184, 0.22);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(2, 6, 23, 0.72);
      text-align: center;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay-box {
      max-width: 380px;
    }

    .overlay h2 {
      margin: 0 0 10px;
      font-size: 1.8rem;
    }

    .overlay p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.45;
    }

    button {
      border: 0;
      cursor: pointer;
      color: #04130a;
      background: var(--accent);
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
      font-size: 1rem;
      box-shadow: 0 12px 30px rgba(34, 197, 94, 0.24);
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      grid-template-areas:
        ". up ."
        "left down right";
      gap: 10px;
      justify-content: center;
      align-items: center;
      margin: 18px auto 6px;
      width: 210px;
    }

    .controls button {
      width: 64px;
      height: 50px;
      padding: 0;
      border-radius: 14px;
      color: var(--text);
      background: rgba(148, 163, 184, 0.14);
      box-shadow: none;
      border: 1px solid rgba(148, 163, 184, 0.18);
      font-size: 1.25rem;
    }

    .controls button:active {
      transform: scale(0.96);
    }

    .up { grid-area: up; }
    .left { grid-area: left; }
    .down { grid-area: down; }
    .right { grid-area: right; }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    kbd {
      padding: 2px 7px;
      border-radius: 6px;
      background: rgba(148, 163, 184, 0.15);
      border: 1px solid rgba(148, 163, 184, 0.24);
      color: var(--text);
      font-family: inherit;
      font-size: 0.82rem;
    }

    @media (max-width: 520px) {
      body {
        padding: 12px;
        align-items: flex-start;
      }

      .game-card {
        padding: 16px;
        border-radius: 18px;
      }

      header {
        flex-direction: column;
      }

      .score-panel {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="game-card">
    <header>
      <div>
        <h1>Gyvatėlė</h1>
        <div class="hint">Valdyk rodyklėmis arba <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>. Pauzė – <kbd>Space</kbd>.</div>
      </div>
      <div class="score-panel">
        Taškai
        <strong id="score">0</strong>
        Rekordas: <span id="best">0</span>
      </div>
    </header>

    <section class="canvas-wrap">
      <canvas id="game" width="480" height="480" aria-label="Gyvatėlės žaidimo lenta"></canvas>

      <div class="overlay" id="overlay">
        <div class="overlay-box">
          <h2 id="overlayTitle">Pasiruošęs?</h2>
          <p id="overlayText">Surink kuo daugiau maisto ir neatsitrenk į sieną ar save.</p>
          <button id="startBtn">Pradėti žaidimą</button>
        </div>
      </div>
    </section>

    <div class="controls" aria-label="Valdymo mygtukai">
      <button class="up" data-dir="up" aria-label="Aukštyn">▲</button>
      <button class="left" data-dir="left" aria-label="Kairėn">◀</button>
      <button class="down" data-dir="down" aria-label="Žemyn">▼</button>
      <button class="right" data-dir="right" aria-label="Dešinėn">▶</button>
    </div>

    <div class="footer">
      <span>Maistas pagreitina žaidimą kas 5 taškus.</span>
      <span>Perkrauti: <kbd>R</kbd></span>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const startBtn = document.getElementById("startBtn");

    const cells = 24;
    const size = canvas.width / cells;

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let best = Number(localStorage.getItem("gyvatelesRekordas") || 0);
    let gameLoop;
    let speed;
    let running = false;
    let paused = false;

    bestEl.textContent = best;

    function resetGame() {
      snake = [
        { x: 11, y: 12 },
        { x: 10, y: 12 },
        { x: 9, y: 12 }
      ];

      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      speed = 135;
      scoreEl.textContent = score;
      placeFood();
      draw();
    }

    function startGame() {
      resetGame();
      running = true;
      paused = false;
      overlay.classList.add("hidden");
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, speed);
    }

    function endGame() {
      running = false;
      clearInterval(gameLoop);

      if (score > best) {
        best = score;
        localStorage.setItem("gyvatelesRekordas", String(best));
        bestEl.textContent = best;
        overlayTitle.textContent = "Naujas rekordas!";
        overlayText.textContent = `Surinkai ${score} taškų. Puikus rezultatas!`;
      } else {
        overlayTitle.textContent = "Žaidimas baigtas";
        overlayText.textContent = `Surinkai ${score} taškų. Bandyk dar kartą!`;
      }

      startBtn.textContent = "Žaisti iš naujo";
      overlay.classList.remove("hidden");
    }

    function pauseGame() {
      if (!running) return;

      paused = !paused;

      if (paused) {
        clearInterval(gameLoop);
        overlayTitle.textContent = "Pauzė";
        overlayText.textContent = "Spausk Space arba mygtuką, kad tęstum.";
        startBtn.textContent = "Tęsti";
        overlay.classList.remove("hidden");
      } else {
        overlay.classList.add("hidden");
        clearInterval(gameLoop);
        gameLoop = setInterval(tick, speed);
      }
    }

    function updateSpeed() {
      const newSpeed = Math.max(70, 135 - Math.floor(score / 5) * 12);
      if (newSpeed !== speed) {
        speed = newSpeed;
        clearInterval(gameLoop);
        gameLoop = setInterval(tick, speed);
      }
    }

    function tick() {
      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (
        head.x < 0 ||
        head.x >= cells ||
        head.y < 0 ||
        head.y >= cells ||
        snake.some(part => part.x === head.x && part.y === head.y)
      ) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 1;
        scoreEl.textContent = score;
        placeFood();
        updateSpeed();
      } else {
        snake.pop();
      }

      draw();
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * cells),
          y: Math.floor(Math.random() * cells)
        };
      } while (snake.some(part => part.x === food.x && part.y === food.y));
    }

    function drawRoundedCell(x, y, color, inset = 2, radius = 7) {
      const px = x * size + inset;
      const py = y * size + inset;
      const s = size - inset * 2;

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(px, py, s, s, radius);
      ctx.fill();
    }

    function drawGrid() {
      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "rgba(148, 163, 184, 0.08)";
      ctx.lineWidth = 1;

      for (let i = 0; i <= cells; i++) {
        const pos = i * size;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(canvas.width, pos);
        ctx.stroke();
      }
    }

    function draw() {
      drawGrid();

      drawRoundedCell(food.x, food.y, getComputedStyle(document.documentElement).getPropertyValue("--food"), 3, 10);

      snake.forEach((part, index) => {
        const color = index === 0
          ? getComputedStyle(document.documentElement).getPropertyValue("--snake-head")
          : getComputedStyle(document.documentElement).getPropertyValue("--snake");
        drawRoundedCell(part.x, part.y, color, 2, 8);
      });
    }

    function setDirection(dir) {
      const moves = {
        up: { x: 0, y: -1 },
        down: { x: 0, y: 1 },
        left: { x: -1, y: 0 },
        right: { x: 1, y: 0 }
      };

      const move = moves[dir];
      if (!move) return;

      const isOpposite = move.x + direction.x === 0 && move.y + direction.y === 0;
      if (!isOpposite) {
        nextDirection = move;
      }
    }

    document.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      if (["arrowup", "w"].includes(key)) {
        event.preventDefault();
        setDirection("up");
      } else if (["arrowdown", "s"].includes(key)) {
        event.preventDefault();
        setDirection("down");
      } else if (["arrowleft", "a"].includes(key)) {
        event.preventDefault();
        setDirection("left");
      } else if (["arrowright", "d"].includes(key)) {
        event.preventDefault();
        setDirection("right");
      } else if (key === " ") {
        event.preventDefault();
        pauseGame();
      } else if (key === "r") {
        startGame();
      }
    });

    document.querySelectorAll("[data-dir]").forEach(button => {
      button.addEventListener("click", () => {
        if (!running) startGame();
        setDirection(button.dataset.dir);
      });
    });

    startBtn.addEventListener("click", () => {
      if (running && paused) {
        pauseGame();
      } else {
        startGame();
      }
    });

    resetGame();
  </script>
</body>
</html>
